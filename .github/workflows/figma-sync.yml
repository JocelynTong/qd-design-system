name: Figma Sync

on:
  # Figma webhook → GitHub API → 触发此 workflow
  # curl -X POST \
  #   -H "Authorization: token $GITHUB_TOKEN" \
  #   -H "Accept: application/vnd.github+json" \
  #   https://api.github.com/repos/{owner}/{repo}/actions/workflows/figma-sync.yml/dispatches \
  #   -d '{"ref":"main","inputs":{"component":"StatusBar"}}'
  repository_dispatch:
    types: [figma-sync]

  # 手动触发（测试用）
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to sync (e.g., StatusBar)'
        required: false
        default: 'StatusBar'
        type: string

  # 定时检查（兜底，每小时一次）
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

     

      - name: Install dependencies
        run: npm install

      - name: Sync StatusBar
        if: github.event_name == 'repository_dispatch' || github.event.inputs.component == 'StatusBar' || github.event_name == 'schedule' || github.event.inputs.component == ''
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
        run: |
          echo "🔄 Syncing StatusBar from Figma..."
          node scripts/sync-statusbar.js

          # 检查是否有变更
          if git diff --quiet "02 components/01.00 Status Bar.json"; then
            echo "✅ No changes detected, skipping commit"
          else
            echo "📝 Changes detected, committing..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "02 components/01.00 Status Bar.json"
            git commit -m "ci: sync StatusBar from Figma $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi

      # 未来扩展：更多组件的 sync
      # - name: Sync NavigationBar
      #   if: github.event.inputs.component == 'NavigationBar' || github.event.inputs.component == ''
      #   run: node scripts/sync-navbar.js
