name: Build Design Tokens

on:
  push:
    paths:
      - '01 tokens/**/*.json'   # 只有 JSON 文件变更时才触发
      - 'generate.py'
  workflow_dispatch:             # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 需要写入权限来 commit 生成的文件

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate processed.json
        run: python generate.py

      - name: Commit & Push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '01 tokens/*/processed.json' '01 tokens/_styles.css'
          git diff --cached --quiet || git commit -m "chore: rebuild tokens [skip ci]"
          git push
