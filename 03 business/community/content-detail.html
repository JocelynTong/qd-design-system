<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>内容详情页 · 千岛</title>
<link rel="stylesheet" href="https://at.alicdn.com/t/c/font_3550031_uwcy4h4l9a9.css">
<link rel="stylesheet" href="styles.css">
<style>
.phone { display:flex; flex-direction:column; }
.scroll-area { flex:1; background:var(--bg-1); }
.post-img {
  width:100%; aspect-ratio:3/4;
  background:var(--bg-4);
  display:flex; align-items:center; justify-content:center;
  font-size:64px;
}
.post-body   { padding:var(--spacing-large); display:flex; flex-direction:column; gap:var(--spacing-normal); }
.post-title  { color:var(--text-1); }
.post-desc   { color:var(--text-2); }
</style>
</head>
<body>

<div class="prototype-layout">
<div class="phone">

  <!-- StatusBarGhost（浮在图片上） -->
  <div class="status-bar status-bar--ghost">
    <span class="status-bar-time t-h6">9:41</span>
    <div class="status-bar-icons t-b6"><span>●●● WiFi 🔋</span></div>
  </div>

  <!-- PostHeader（Ghost NavBar，返回按钮） -->
  <div class="navbar navbar--ghost">
    <div class="navbar-left">
      <button class="icon-btn" onclick="location.href='home-feed.html'">
        <i class="KurilIcons kuril-arrow_left ki-22"></i>
      </button>
    </div>
    <div class="navbar-right">
      <button class="icon-btn"><i class="KurilIcons kuril-more ki-22"></i></button>
    </div>
  </div>

  <!-- 滚动内容区 -->
  <div class="scroll-area">
    <!-- PostContents -->
    <div class="post-img">🎨</div>
    <!-- 正文 -->
    <div class="post-body">
      <h2 class="post-title t-h4">这套 Figma Variables 三级映射真的太绝了</h2>
      <p class="post-desc t-b5">详细介绍 Figma Variables 如何做到三级 Token 映射，换色只需改一处……</p>
    </div>
  </div>

  <!-- PostActionBar -->
  <div class="bottom-bar">
    <button class="icon-btn"><i class="KurilIcons kuril-community_like_normal ki-22"></i></button>
    <button class="icon-btn"><i class="KurilIcons kuril-comment ki-22"></i></button>
    <button class="icon-btn"><i class="KurilIcons kuril-collect_normal ki-22"></i></button>
    <button class="icon-btn"><i class="KurilIcons kuril-share ki-22"></i></button>
  </div>

</div><!-- .phone -->

<!-- 流程图 -->
<div class="flow-chart">
  <a class="flow-node" href="home-feed.html">
    <span class="node-icon">🏠</span>
    <span class="node-label">首页 Feed</span>
  </a>
  <div class="flow-edge"><span class="flow-edge-label">点击卡片</span></div>
  <a class="flow-node active" href="content-detail.html">
    <span class="node-icon">📄</span>
    <span class="node-label">内容详情页</span>
  </a>
</div>

</div><!-- .prototype-layout -->
</body>
</html>
